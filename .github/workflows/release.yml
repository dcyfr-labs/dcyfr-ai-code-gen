name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  NODE_VERSION: '24.13.0'
  NPM_CONFIG_PROVENANCE: true

jobs:
  release:
    name: Release to npm
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Mint GitHub App token
        id: app-token
        # Only mint when org-level RELEASE_APP_ID is set. `continue-on-error`
        # makes the workflow degrade-safe: if the App isn't installed on this
        # repo yet, or secrets are missing, mint fails non-fatally and the
        # fallback chain picks up RELEASE_TOKEN.
        if: ${{ vars.RELEASE_APP_ID != '' }}
        continue-on-error: true
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # PAT with `workflow` scope when available — GITHUB_TOKEN cannot push
          # tags on commits touching .github/workflows/* (server-side reject).
          # Falls back cleanly; degraded mode no-ops tag push for such releases.
          token: ${{ steps.app-token.outputs.token || secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: ''  # No cache - package is part of workspace

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          npm install
          npm install -D @changesets/cli @changesets/changelog-github
      
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest
      
      - name: Verify npm version and OIDC support
        run: |
          echo "npm version:"
          npm --version
          if ! npm --version | awk -F. '{if (($1*100)+$2 < 1105) exit 1}'; then
            echo "❌ npm version must be >= 11.5 for OIDC support"
            exit 1
          fi
          echo "✅ npm version compatible"
          
          echo "Checking OIDC environment:"
          if env | grep -q ACTIONS_ID_TOKEN; then
            echo "✅ OIDC token available"
          else
            echo "⚠️ OIDC token not found (may not be needed at this step)"
          fi
      
      - name: Run linter
        run: npm run lint
        continue-on-error: true
      
      - name: Type check
        run: npm run typecheck
      
      - name: Run tests
        run: npm run test:run
      
      - name: Build package
        run: npm run build
      
      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

